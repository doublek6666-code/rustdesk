name: Build Windows x86 and x64

on:
  workflow_dispatch:
    inputs:
      id_server:
        description: "ID server/IP (overrides secret ID_SERVER)"
        required: false
        default: ""
      rs_pub_key:
        description: "Public key (overrides secret RS_PUB_KEY)"
        required: false
        default: ""
      relay_server:
        description: "Relay server (optional, overrides secret RELAY_SERVER)"
        required: false
        default: ""

env:
  LLVM_VERSION: "15.0.6"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  FLUTTER_VERSION: "3.24.5"
  RUST_VERSION: "1.75"
  SCITER_RUST_VERSION: "1.75"
  ID_SERVER: "${{ inputs.id_server || secrets.ID_SERVER }}"
  RS_PUB_KEY: "${{ inputs.rs_pub_key || secrets.RS_PUB_KEY }}"
  RELAY_SERVER: "${{ inputs.relay_server || secrets.RELAY_SERVER }}"
  RUSTDESK_CONFIG_FORBID_CHANGE: "true"
  RUSTDESK_CONN_TYPE: "incoming"
  RUSTDESK_HIDE_SERVER_SETTINGS: "true"
  RUSTDESK_ALLOW_AUTO_UPDATE: "false"
  RUSTDESK_APPROVE_MODE: "password"
  RUSTDESK_VERIFICATION_METHOD: "use-permanent-password"
  RUSTDESK_PERMANENT_PASSWORD: "admin321"

jobs:
  generate-bridge:
    uses: ./.github/workflows/bridge.yml

  windows-x64-flutter:
    name: windows-x64-flutter
    needs: [generate-bridge]
    runs-on: windows-2022
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      - name: Restore bridge files
        uses: actions/download-artifact@master
        with:
          name: bridge-artifact
          path: ./

      - uses: Swatinem/rust-cache@v2

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        shell: bash
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
        run: |
          $VCPKG_ROOT/vcpkg install --triplet x64-windows-static --x-install-root="$VCPKG_ROOT/installed"

      - name: Build x64 flutter package
        shell: pwsh
        run: |
          $env:RUSTDESK_CONN_TYPE = "incoming"
          if ([string]::IsNullOrWhiteSpace($env:ID_SERVER)) { $env:ID_SERVER = "110.42.233.64" }
          if ([string]::IsNullOrWhiteSpace($env:RS_PUB_KEY)) { $env:RS_PUB_KEY = "6ORf+JwYXESDfywi4LdZWxSao1uHSrAH3Yc+RvDYdjo=" }
          if ([string]::IsNullOrWhiteSpace($env:RELAY_SERVER)) { $env:RELAY_SERVER = $env:ID_SERVER }
          python3 .\build.py --portable --hwcodec --flutter --vram --skip-portable-pack
          mkdir -Force artifacts-x64 | Out-Null
          Copy-Item -Path ".\flutter\build\windows\x64\runner\Release\*" -Destination ".\artifacts-x64\" -Recurse -Force

      - name: Upload x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-x64
          path: artifacts-x64

  windows-x86-sciter:
    name: windows-x86-sciter
    needs: [generate-bridge]
    runs-on: windows-2022
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install LLVM and Clang (32-bit)
        uses: rustdesk-org/install-llvm-action-32bit@master
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly-2023-10-13-i686-pc-windows-msvc
          targets: i686-pc-windows-msvc
          components: rustfmt

      - name: Restore bridge files
        uses: actions/download-artifact@master
        with:
          name: bridge-artifact
          path: ./

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: windows-sciter-x86

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        shell: bash
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x86-windows-static
        run: |
          $VCPKG_ROOT/vcpkg install --triplet x86-windows-static --x-install-root="$VCPKG_ROOT/installed"

      - name: Build x86 sciter package
        shell: bash
        run: |
          export RUSTDESK_CONN_TYPE="incoming"
          export ID_SERVER="${ID_SERVER:-110.42.233.64}"
          export RS_PUB_KEY="${RS_PUB_KEY:-6ORf+JwYXESDfywi4LdZWxSao1uHSrAH3Yc+RvDYdjo=}"
          export RELAY_SERVER="${RELAY_SERVER:-$ID_SERVER}"
          python3 res/inline-sciter.py
          sed -i 's/branch = "dyn"/branch = "dyn_x86"/g' ./Cargo.toml
          cargo build --features inline,vram,hwcodec --release --bins
          mkdir -p artifacts-x86
          cp ./target/release/rustdesk.exe ./artifacts-x86/rustdesk.exe
          curl -LJ -o ./artifacts-x86/sciter.dll https://github.com/c-smile/sciter-sdk/raw/master/bin.win/x32/sciter.dll

      - name: Upload x86 artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-x86
          path: artifacts-x86
